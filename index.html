<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="images/favicon-me.png" type="image/png">
  <title>Seshan Rodrigo | Portfolio</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#fff;
      color:#111;
      transition:0.4s;
    }
    [data-theme="dark"]{
      background:#111827;
      color:white;
    }
    nav{
      display:flex;
      justify-content:space-between;
      padding:20px 50px;
      background:#2563eb;
      color:white;
      position:sticky;
      top:0;
    }
    .theme-btn{
      border:none;
      padding:10px 20px;
      border-radius:20px;
      cursor:pointer;
    }
    #hero{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:50px;
      padding:80px 50px;
      flex-wrap:wrap;
    }
    .profile-photo{
      width:300px;
      height:350px;
      object-fit:cover;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
      transition:0.4s;
    }
    .hero-text{
      max-width:500px;
    }
    .hero-text h1{
      font-size:50px;
      margin-bottom:10px;
    }
    .hero-text p{
      line-height:1.8;
      color:gray;
    }
    .btn{
      display:inline-block;
      margin-top:20px;
      padding:12px 25px;
      background:#2563eb;
      color:white;
      border-radius:8px;
    }
    footer{
      text-align:center;
      padding:30px;
      background:#f3f4f6;
      margin-top:50px;
    }
  </style>
</head>
<body>

<nav>
  <h2>Seshan Rodrigo</h2>
  <button class="theme-btn" id="themeBtn">🌙 Dark</button>
</nav>

<section id="hero">
  <div class="hero-text">
    <h1>Seshan Rodrigo</h1>
    <h3>Computer Science with AI Undergraduate</h3>
    <p>
      Passionate about AI, software engineering, frontend design,
      and creating real-world digital solutions.
    </p>
    <a href="#contact" class="btn">Contact Me</a>
  </div>

  <img
    class="profile-photo"
    id="profilePhoto"
    src="images/me2.jpg"
    alt="Seshan Rodrigo"
  />
</section>

<footer>
  © 2026 Seshan Rodrigo. All rights reserved.
</footer>

<script>
const root = document.documentElement;
const btn = document.getElementById("themeBtn");
const photo = document.getElementById("profilePhoto");

const IMGS = {
  light: "images/me2.jpg",
  dark: "images/me1.png"
};

let dark = false;

btn.addEventListener("click", () => {
  dark = !dark;
  root.setAttribute("data-theme", dark ? "dark" : "light");

  btn.textContent = dark ? "☀️ Light" : "🌙 Dark";

  photo.style.opacity = "0";
  setTimeout(() => {
    photo.src = dark ? IMGS.dark : IMGS.light;
    photo.style.opacity = "1";
  }, 300);
});
</script>

</body>
</html>
